name: Generate Daily Challenge

on:
  schedule:
    - cron: '0 15 * * *' # UTC 15:00 = KST 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-challenge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate challenge for today
        run: node scripts/generate-challenge.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/challenges.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: add daily challenge for today"
          git push
